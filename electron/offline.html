<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blue Horizon - Offline</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0f172a; /* Slate 900 */
        color: #f8fafc; /* Slate 50 */
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        text-align: center;
      }
      .icon {
        width: 80px;
        height: 80px;
        margin-bottom: 1.5rem;
        color: #ef4444; /* Red 500 */
      }
      h1 {
        font-size: 2rem;
        margin: 0 0 0.5rem 0;
        font-weight: 700;
      }
      p {
        color: #94a3b8; /* Slate 400 */
        font-size: 1.1rem;
        margin: 0 0 2rem 0;
        max-width: 400px;
      }
      button {
        background-color: #3b82f6; /* Blue 500 */
        color: white;
        border: none;
        padding: 0.75rem 2rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #2563eb; /* Blue 600 */
      }
    </style>
  </head>
  <body>
    <svg
      class="icon"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.163a1 1 0 111.414 1.414M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
      ></path>
    </svg>
    <h1>You're Offline</h1>
    <p>
      Blue Horizon requires an active internet connection to load live tracking
      data.
    </p>
    <button onclick="window.electronAPI.retryConnection()">
      Retry Connection
    </button>

    <script>
      // Just in case IPC isn't available somehow, reload page as fallback
      if (!window.electronAPI) {
        document.querySelector("button").onclick = () =>
          window.location.reload();
      }
    </script>
  </body>
</html>
